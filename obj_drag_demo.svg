<?xml version="1.0" encoding="UTF-8"?>
<!--
  Demonstration animee du comportement drag-and-drop produit par
  components/lvgl/widgets/obj_example.yaml (portage de lv_example_obj_2.c).

  L'animation simule :
   1) le doigt qui appuie sur la boite "Drag me"
   2) la boite qui suit le doigt (evenement on_pressing + lv_indev_get_vect)
   3) le relachement et un second drag dans une autre direction

  Lisible dans n'importe quel navigateur et sur la preview GitHub.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 480 320"
     width="480" height="320"
     font-family="sans-serif">

  <!-- ====== Ecran de l'ESP32 ====== -->
  <defs>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cadre ecran -->
  <rect x="10" y="10" width="460" height="300" rx="18" ry="18"
        fill="#1e1e1e" stroke="#333" stroke-width="3"/>
  <rect x="22" y="22" width="436" height="276" rx="10" ry="10"
        fill="#fafafa"/>

  <!-- Titre -->
  <text x="240" y="50" text-anchor="middle" fill="#333" font-size="14"
        font-weight="bold">Drag the blue box</text>

  <!-- ====== Boite draggable ====== -->
  <!-- Position initiale (80,90), taille 150x100 -->
  <g filter="url(#shadow)">
    <rect id="box" x="80" y="90" width="150" height="100" rx="8" ry="8"
          fill="url(#boxGrad)" stroke="#0D47A1" stroke-width="2">
      <!-- trajet : immobile -> suit le doigt -> immobile -> suit a nouveau -> retour -->
      <animate attributeName="x"
               dur="8s" repeatCount="indefinite"
               keyTimes="0;  0.1; 0.35; 0.45; 0.55; 0.8; 0.95; 1"
               values="80;   80;  220;  220;  220;  90;   80;   80"/>
      <animate attributeName="y"
               dur="8s" repeatCount="indefinite"
               keyTimes="0;  0.1; 0.35; 0.45; 0.55; 0.8; 0.95; 1"
               values="90;   90;  150;  150;  150;  90;   90;   90"/>
    </rect>
    <text id="boxLabel" x="155" y="148" text-anchor="middle"
          fill="#ffffff" font-size="16" font-weight="bold"
          pointer-events="none">
      Drag me
      <animate attributeName="x"
               dur="8s" repeatCount="indefinite"
               keyTimes="0;  0.1; 0.35; 0.45; 0.55; 0.8; 0.95; 1"
               values="155; 155; 295; 295; 295; 165; 155; 155"/>
      <animate attributeName="y"
               dur="8s" repeatCount="indefinite"
               keyTimes="0;  0.1; 0.35; 0.45; 0.55; 0.8; 0.95; 1"
               values="148; 148; 208; 208; 208; 148; 148; 148"/>
    </text>
  </g>

  <!-- ====== Curseur / doigt ====== -->
  <g>
    <!-- ombre de contact (visible uniquement pendant le press) -->
    <circle r="18" fill="#000" fill-opacity="0">
      <animate attributeName="cx"
               dur="8s" repeatCount="indefinite"
               keyTimes="0; 0.08; 0.1; 0.35; 0.45; 0.55; 0.8; 0.82; 1"
               values="155;155; 155; 295; 295; 295; 165; 165; 155"/>
      <animate attributeName="cy"
               dur="8s" repeatCount="indefinite"
               keyTimes="0; 0.08; 0.1; 0.35; 0.45; 0.55; 0.8; 0.82; 1"
               values="140;140; 140; 200; 200; 200; 140; 140; 140"/>
      <animate attributeName="fill-opacity"
               dur="8s" repeatCount="indefinite"
               keyTimes="0; 0.1; 0.35; 0.45; 0.55; 0.8; 0.82; 1"
               values="0;  0.25; 0.25; 0;   0.25; 0.25; 0;   0"/>
    </circle>

    <!-- doigt (cercle + petit triangle direction) -->
    <circle cx="155" cy="140" r="12"
            fill="#ff5252" stroke="#b71c1c" stroke-width="2">
      <animate attributeName="cx"
               dur="8s" repeatCount="indefinite"
               keyTimes="0; 0.08; 0.1; 0.35; 0.45; 0.55; 0.8; 0.82; 1"
               values="60; 155; 155; 295; 295; 295; 165; 165; 60"/>
      <animate attributeName="cy"
               dur="8s" repeatCount="indefinite"
               keyTimes="0; 0.08; 0.1; 0.35; 0.45; 0.55; 0.8; 0.82; 1"
               values="250;140; 140; 200; 200; 200; 140; 140; 250"/>
      <!-- change de couleur quand il est en mode PRESS -->
      <animate attributeName="fill"
               dur="8s" repeatCount="indefinite"
               keyTimes="0; 0.1; 0.35; 0.45; 0.55; 0.8; 0.82; 1"
               values="#ff5252;#4CAF50;#4CAF50;#ff5252;#4CAF50;#4CAF50;#ff5252;#ff5252"/>
    </circle>
  </g>

  <!-- ====== Legende / etat ====== -->
  <g font-size="11" fill="#555">
    <rect x="30" y="260" width="420" height="32" rx="6" ry="6"
          fill="#eeeeee" stroke="#cccccc"/>
    <text x="40" y="279">Event:</text>
    <text x="80" y="279" font-weight="bold" fill="#1565C0">
      <animate attributeName="textContent"
               dur="8s" repeatCount="indefinite"
               keyTimes="0; 0.08; 0.1; 0.35; 0.45; 0.55; 0.8; 0.82; 1"
               values="idle; PRESS; PRESSING; RELEASE; PRESS; PRESSING; RELEASE; idle; idle"/>
      PRESSING
    </text>

    <text x="200" y="279">Action:</text>
    <text x="245" y="279" font-weight="bold" fill="#0D47A1">
      <animate attributeName="textContent"
               dur="8s" repeatCount="indefinite"
               keyTimes="0; 0.08; 0.1; 0.35; 0.45; 0.55; 0.8; 0.82; 1"
               values="-; -; lv_obj_set_pos(obj, x+dx, y+dy); -; -; lv_obj_set_pos(obj, x+dx, y+dy); -; -; -"/>
      lv_obj_set_pos(obj, x+dx, y+dy)
    </text>
  </g>

  <!-- Petit rappel du YAML -->
  <text x="240" y="308" text-anchor="middle" fill="#888" font-size="10">
    obj_example.yaml  -  on_pressing + lv_indev_get_vect()
  </text>
</svg>

# ============================================================================
# Draggable 3x3 grid — SNIPPET 100% DECLARATIF
# ============================================================================
# Option A, drag + swap-on-drop, SANS AUCUNE LAMBDA cote YAML.
# Toute la mecanique (callbacks LVGL, etat, cleanup memoire) est dans le
# composant C++ natif : components/draggable_grid/
#
# Tu n'as que DEUX choses a ajouter a waveshare (3).yaml :
#   1) declarer le composant externe
#   2) un unique bloc draggable_grid:
#
# Les 9 boutons existants restent identiques : tu n'ajoutes ni on_press ni
# on_pressing ni on_release, tu ne touches a aucune lambda.
# ============================================================================


# ----------------------------------------------------------------------------
# BLOC 1 — external_components (en haut du fichier, ou en complement du bloc
# external_components existant)
# ----------------------------------------------------------------------------
external_components:
  - source:
      type: local
      path: components
    components: [draggable_grid]


# ----------------------------------------------------------------------------
# BLOC 2 — la declaration draggable_grid (n'importe ou au niveau racine)
# ----------------------------------------------------------------------------
# Ordre des cases = ordre des boutons.
# cell_w / cell_h sont les dimensions d'un bouton (pour detecter la case la
# plus proche au drop).
draggable_grid:
  cell_w: 150
  cell_h: 100
  cells:
    - [10, 220]     # case 0 : col 0, row 0
    - [200, 220]    # case 1 : col 1, row 0
    - [380, 220]    # case 2 : col 2, row 0
    - [10, 345]     # case 3 : col 0, row 1
    - [200, 345]    # case 4 : col 1, row 1
    - [380, 345]    # case 5 : col 2, row 1
    - [10, 480]     # case 6 : col 0, row 2
    - [200, 480]    # case 7 : col 1, row 2
    - [380, 480]    # case 8 : col 2, row 2
  buttons:
    - btn_light
    - btn_alarm
    - btn_test3
    - btn_player
    - btn_camera
    - btn_test4
    - btn_settings
    - btn_test
    - btn_test2


# ============================================================================
# CE QUI SE PASSE SOUS LE CAPOT
# ============================================================================
#
# Le composant ESPHome draggable_grid genere automatiquement :
#   - un include de draggable_grid.h
#   - un Component C++ avec setup_priority::LATE (s'execute APRES LVGL)
#   - une boucle qui, pour chaque bouton, appelle lv_obj_add_event_cb()
#     avec un unique callback qui gere PRESSED / PRESSING / RELEASED.
#
# Memoire
# -------
# - Zero allocation dynamique. Etat global = 16 Cell + 16 Slot + 5 entiers
#   ~= 180 octets stockes statiquement.
# - A chaque RELEASE, g_active est remis a -1 AVANT toute autre logique -
#   la "RAM" d'etat transitoire est donc systematiquement videe a la fin
#   de chaque operation de drag.
#
# Ce qu'il faut savoir
# --------------------
# - L'ordre des cells[] doit correspondre a l'ordre des buttons[] a l'init.
#   Ensuite le runtime s'occupe du suivi : au swap, le pointeur stocke dans
#   g_slots[] est echange, pas les ids YAML.
# - Les callbacks s'ajoutent EN PLUS de ceux que tu as deja sur tes boutons
#   (on_click, etc.) - LVGL accepte plusieurs callbacks par obj. Donc tes
#   on_click existants continuent de fonctionner normalement.
# - La disposition n'est PAS persistee sur flash dans cette version. Apres
#   un reboot, les boutons repartent de cells[0..8]. Pour la persistance
#   il faudra ajouter des globals ESPHome (c'est la prochaine etape).

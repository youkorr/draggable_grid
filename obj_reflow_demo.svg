<?xml version="1.0" encoding="UTF-8"?>
<!--
  Demo animee : "home-screen reflow" facon iOS / Android.

  3 widgets A, B, C dans une rangee (flex container).
  L'utilisateur attrape A et le deplace vers la droite.
  B et C glissent pour combler la place, comme dans le jiggle-mode.

  Phases (boucle 6 s) :
    0.00 - 0.50 s   | idle
    0.50 - 1.00 s   | le doigt arrive et presse A
    1.00 - 1.20 s   | A se leve (scale + ombre), jiggle des autres
    1.20 - 3.30 s   | A suit le doigt, B puis C slide vers la gauche
    3.30 - 3.50 s   | relachement, A snap dans la derniere case
    3.50 - 5.00 s   | nouvelle disposition
    5.00 - 5.50 s   | reset animee
    5.50 - 6.00 s   | idle

  Lisible dans Chrome / Firefox / Safari / GitHub raw.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 480 320"
     width="480" height="320"
     font-family="sans-serif">

  <defs>
    <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="gC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="drop2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Phone frame -->
  <rect x="10" y="10" width="460" height="300" rx="22" ry="22"
        fill="#111" stroke="#333" stroke-width="3"/>
  <rect x="22" y="22" width="436" height="276" rx="12" ry="12"
        fill="#f7f7f7"/>

  <!-- Status bar -->
  <text x="240" y="45" text-anchor="middle" fill="#333"
        font-size="13" font-weight="bold">Home screen - drag to reorder</text>

  <!-- =============================================================
       Widget C (bleu) - cell 2 initialement, glisse vers cell 1
       ============================================================= -->
  <g transform="translate(300 110)" filter="url(#drop2)">
    <rect id="C" x="0" y="0" width="100" height="100" rx="14" ry="14"
          fill="url(#gC)">
      <animate attributeName="x"
               dur="6s" repeatCount="indefinite"
               keyTimes="0;   0.450; 0.500; 0.833; 0.917; 1"
               values="0;    0;     -120;  -120;  0;     0"/>
    </rect>
    <text x="50" y="60" text-anchor="middle" fill="#fff"
          font-size="34" font-weight="bold" pointer-events="none">C
      <animate attributeName="x"
               dur="6s" repeatCount="indefinite"
               keyTimes="0;   0.450; 0.500; 0.833; 0.917; 1"
               values="50;   50;    -70;   -70;   50;    50"/>
    </text>
    <!-- jiggle during drag -->
    <animateTransform attributeName="transform" type="rotate"
       additive="sum"
       dur="0.4s" repeatCount="5"
       begin="1.0s"
       values="0 50 50; -2 50 50; 0 50 50; 2 50 50; 0 50 50"
       keyTimes="0; 0.25; 0.5; 0.75; 1"/>
  </g>

  <!-- =============================================================
       Widget B (vert) - cell 1 initialement, glisse vers cell 0
       ============================================================= -->
  <g transform="translate(180 110)" filter="url(#drop2)">
    <rect id="B" x="0" y="0" width="100" height="100" rx="14" ry="14"
          fill="url(#gB)">
      <animate attributeName="x"
               dur="6s" repeatCount="indefinite"
               keyTimes="0;   0.283; 0.333; 0.833; 0.917; 1"
               values="0;    0;     -120;  -120;  0;     0"/>
    </rect>
    <text x="50" y="60" text-anchor="middle" fill="#fff"
          font-size="34" font-weight="bold" pointer-events="none">B
      <animate attributeName="x"
               dur="6s" repeatCount="indefinite"
               keyTimes="0;   0.283; 0.333; 0.833; 0.917; 1"
               values="50;   50;    -70;   -70;   50;    50"/>
    </text>
    <animateTransform attributeName="transform" type="rotate"
       additive="sum"
       dur="0.4s" repeatCount="5"
       begin="1.0s"
       values="0 50 50; 2 50 50; 0 50 50; -2 50 50; 0 50 50"
       keyTimes="0; 0.25; 0.5; 0.75; 1"/>
  </g>

  <!-- =============================================================
       Widget A (rouge) - celui que l'on drague
       trajet : cell 0 (x=60) -> cell 2 (x=300)
       ============================================================= -->
  <g filter="url(#drop)">
    <rect id="A" x="60" y="110" width="100" height="100" rx="14" ry="14"
          fill="url(#gA)" stroke="#b71c1c" stroke-width="2">
      <animate attributeName="x"
               dur="6s" repeatCount="indefinite"
               keyTimes="0;    0.083; 0.167; 0.200; 0.550; 0.583; 0.833; 0.917; 1"
               values="60;    60;    60;    60;    300;   300;   300;   60;    60"/>
      <animate attributeName="y"
               dur="6s" repeatCount="indefinite"
               keyTimes="0;    0.167; 0.200; 0.550; 0.583; 0.833; 0.917; 1"
               values="110;   110;   100;   100;   110;   110;   110;   110"/>
      <animate attributeName="width"
               dur="6s" repeatCount="indefinite"
               keyTimes="0;    0.167; 0.200; 0.550; 0.583; 1"
               values="100;   100;   110;   110;   100;   100"/>
      <animate attributeName="height"
               dur="6s" repeatCount="indefinite"
               keyTimes="0;    0.167; 0.200; 0.550; 0.583; 1"
               values="100;   100;   110;   110;   100;   100"/>
    </rect>
    <text x="110" y="170" text-anchor="middle" fill="#fff"
          font-size="34" font-weight="bold" pointer-events="none">A
      <animate attributeName="x"
               dur="6s" repeatCount="indefinite"
               keyTimes="0;    0.083; 0.167; 0.200; 0.550; 0.583; 0.833; 0.917; 1"
               values="110;   110;   110;   115;   355;   350;   350;   110;   110"/>
      <animate attributeName="y"
               dur="6s" repeatCount="indefinite"
               keyTimes="0;    0.167; 0.200; 0.550; 0.583; 1"
               values="170;   170;   165;   165;   170;   170"/>
    </text>
  </g>

  <!-- =============================================================
       Doigt
       ============================================================= -->
  <g>
    <!-- halo pression -->
    <circle r="22" fill="#ff5252" fill-opacity="0">
      <animate attributeName="cx"
               dur="6s" repeatCount="indefinite"
               keyTimes="0;    0.083; 0.167; 0.550; 0.583; 0.833; 0.917; 1"
               values="110;   110;   110;   350;   350;   350;   520;   520"/>
      <animate attributeName="cy"
               dur="6s" repeatCount="indefinite"
               values="160;160;160;160;160;160;300;300"
               keyTimes="0;    0.083; 0.167; 0.550; 0.583; 0.833; 0.917; 1"/>
      <animate attributeName="fill-opacity"
               dur="6s" repeatCount="indefinite"
               keyTimes="0; 0.167; 0.200; 0.550; 0.583; 1"
               values="0;  0;     0.35;  0.35;  0;     0"/>
    </circle>

    <!-- pointeur -->
    <circle cx="520" cy="300" r="13"
            fill="#ff5252" stroke="#b71c1c" stroke-width="2">
      <animate attributeName="cx"
               dur="6s" repeatCount="indefinite"
               keyTimes="0;    0.083; 0.167; 0.550; 0.583; 0.833; 0.917; 1"
               values="520;   110;   110;   350;   350;   350;   520;   520"/>
      <animate attributeName="cy"
               dur="6s" repeatCount="indefinite"
               keyTimes="0;    0.083; 0.167; 0.550; 0.583; 0.833; 0.917; 1"
               values="300;   160;   160;   160;   160;   160;   300;   300"/>
      <animate attributeName="fill"
               dur="6s" repeatCount="indefinite"
               keyTimes="0; 0.167; 0.200; 0.583; 0.650; 1"
               values="#ff5252;#ff5252;#4CAF50;#4CAF50;#ff5252;#ff5252"/>
    </circle>
  </g>

  <!-- =============================================================
       Bandeau d'etat
       ============================================================= -->
  <g font-size="11" fill="#555">
    <rect x="30" y="255" width="420" height="38" rx="6" ry="6"
          fill="#eeeeee" stroke="#d0d0d0"/>

    <text x="42" y="273">Phase</text>
    <text x="42" y="287" font-weight="bold" fill="#1565C0" font-size="11">
      <animate attributeName="textContent"
               dur="6s" repeatCount="indefinite"
               keyTimes="0; 0.083; 0.167; 0.283; 0.450; 0.583; 0.833; 1"
               values="idle; PRESS; LIFT; DRAG; REFLOW; SNAP; IDLE-NEW; reset"/>
      idle
    </text>

    <text x="170" y="273">LVGL action</text>
    <text x="170" y="287" font-weight="bold" fill="#0D47A1" font-size="10">
      <animate attributeName="textContent"
               dur="6s" repeatCount="indefinite"
               keyTimes="0; 0.167; 0.283; 0.450; 0.583; 0.833; 1"
               values="-; lv_obj_set_pos(A,x,y); lv_obj_move_to_index(B,0); lv_obj_move_to_index(C,1); flex_layout_update(); hold; reset"/>
      flex_layout_update()
    </text>
  </g>

  <text x="240" y="309" text-anchor="middle" fill="#888" font-size="9">
    parent: flex_flow=ROW  .  drag + lv_obj_move_to_index() -> reflow auto
  </text>
</svg>
